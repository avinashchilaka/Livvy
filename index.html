<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBTrack — Gig Driver Finance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: #0a0b0d;
  color: #eef0f5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}

.container {
  width: 100%;
  max-width: 400px;
}

.logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, #7ecca0, #4db885);
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(126,204,160,0.25);
}

.logo h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: #eef0f5;
}

.logo p {
  font-size: 0.82rem;
  color: #616878;
  margin-top: 4px;
}

.card {
  background: #16181c;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  padding: 28px 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.tabs {
  display: flex;
  background: #0a0b0d;
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
  gap: 4px;
}

.tab-btn {
  flex: 1;
  padding: 9px;
  background: transparent;
  border: none;
  border-radius: 7px;
  color: #616878;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.tab-btn.active {
  background: #7ecca0;
  color: #0a0b0d;
  font-weight: 600;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: #616878;
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  background: #0a0b0d;
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: #eef0f5;
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}

.form-group input:focus {
  border-color: #7ecca0;
}

.form-group input::placeholder {
  color: #616878;
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #7ecca0, #4db885);
  border: none;
  border-radius: 12px;
  color: #0a0b0d;
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 8px;
  box-shadow: 0 4px 16px rgba(126,204,160,0.3);
}

.btn-primary:active {
  transform: scale(0.98);
  opacity: 0.9;
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: #616878;
  font-size: 0.78rem;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.07);
}

.btn-google {
  width: 100%;
  padding: 13px;
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  color: #eef0f5;
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: background 0.2s, border-color 0.2s;
}

.btn-google:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.15);
}

.error-msg {
  background: rgba(240,98,106,0.1);
  border: 1px solid rgba(240,98,106,0.3);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 0.82rem;
  color: #f0626a;
  margin-bottom: 16px;
  display: none;
}

.success-msg {
  background: rgba(126,204,160,0.1);
  border: 1px solid rgba(126,204,160,0.3);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 0.82rem;
  color: #7ecca0;
  margin-bottom: 16px;
  display: none;
}

.footer-text {
  text-align: center;
  font-size: 0.75rem;
  color: #616878;
  margin-top: 20px;
  line-height: 1.6;
}

.loading {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(10,11,13,0.3);
  border-top-color: #0a0b0d;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

#loginForm, #signupForm { display: none; }
#loginForm.active, #signupForm.active { display: block; }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <h1>PBTrack</h1>
    <p>Gig Driver Finance Dashboard</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
        Sign In
      </button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="handleGoogleAuth()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Avinash" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 8 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Monthly Earnings Goal ($)</label>
        <input type="number" id="signupGoal" placeholder="e.g. 9500" min="0">
      </div>
      <button class="btn-primary" id="signupBtn" onclick="handleSignup()">
        Create Account
      </button>
    </div>
  </div>

  <p class="footer-text">
    Your data is encrypted and private.<br>
    Built for gig drivers. 💚
  </p>
</div>

<script>
  const API = window.location.origin;

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1));
    });
    document.getElementById('loginForm').classList.toggle('active', tab==='login');
    document.getElementById('signupForm').classList.toggle('active', tab==='signup');
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Please wait...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btnId === 'loginBtn' ? 'Sign In' : 'Create Account';
    }
  }

  async function handleLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showError('Please fill in all fields.');
    setLoading('loginBtn', true);
    try {
      const res  = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      localStorage.setItem('pb_token', data.token);
      localStorage.setItem('pb_user', JSON.stringify(data.user));
      window.location.href = '/app.html';
    } catch(e) {
      showError(e.message);
      setLoading('loginBtn', false);
    }
  }

  async function handleSignup() {
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const goal     = parseFloat(document.getElementById('signupGoal').value) || 9500;
    if (!name || !email || !password) return showError('Please fill in all fields.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');
    setLoading('signupBtn', true);
    try {
      const res  = await fetch(`${API}/api/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, monthly_goal: goal })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Signup failed');
      localStorage.setItem('pb_token', data.token);
      localStorage.setItem('pb_user', JSON.stringify(data.user));
      window.location.href = '/app.html';
    } catch(e) {
      showError(e.message);
      setLoading('signupBtn', false);
    }
  }

  async function handleGoogleAuth() {
    try {
      const res  = await fetch(`${API}/api/auth/google-url`);
      const data = await res.json();
      window.location.href = data.url;
    } catch(e) {
      showError('Google sign-in unavailable right now.');
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('loginForm').classList.contains('active');
      if (loginActive) handleLogin();
      else handleSignup();
    }
  });

  // Already logged in? Go straight to app
  if (localStorage.getItem('pb_token')) {
    window.location.href = '/app.html';
  }
</script>
</body>
</html>
